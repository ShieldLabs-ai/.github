name: Bug report
description: Report a problem with a ShieldLabs SDK
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps or a code snippet that reproduces the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SDK version
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Language / runtime version
      placeholder: "e.g. Node 20, Python 3.12, Go 1.22, PHP 8.3"
    validations:
      required: true
